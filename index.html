<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Core Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00d4ff; --cyan-glow: rgba(0, 212, 255, 0.4);
            --bg-dark: #0f1115; --card-bg: rgba(255, 255, 255, 0.03); 
            --card-border: rgba(255, 255, 255, 0.08); --text-main: #e2e8f0; --text-muted: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #1a1d24 0%, var(--bg-dark) 100%); color: var(--text-main); min-height: 100vh; margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #ffffff; font-weight: 800; font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 40px; text-shadow: 0 0 20px var(--cyan-glow); }
        h1 span { color: var(--cyan); }

        /* Navigation */
        .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 40px; background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 50px; width: fit-content; margin-inline: auto; border: 1px solid var(--card-border); }
        .tab { padding: 10px 24px; cursor: pointer; border-radius: 40px; font-weight: 600; font-size: 0.95rem; transition: 0.3s; color: var(--text-muted); }
        .tab:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
        .tab.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan-glow); }

        .page { display: none; }
        .page.active { display: block; }

        /* UI Elements */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; }
        label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--card-border); color: #fff; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-family: 'JetBrains Mono'; }
        
        .btn-gen { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-gen:hover { box-shadow: 0 0 15px var(--cyan-glow); }
        
        /* Power Registry Specifics */
        .ability-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .ability-card { background: #1a1a1a; border: 1px solid var(--card-border); border-radius: 6px; padding: 12px; }
        .ability-card.active { border-color: var(--cyan); }
        .tag { font-family: 'JetBrains Mono'; background: rgba(0, 229, 255, 0.08); color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.2); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; display: inline-block; margin: 4px; }
        #output { background: #050505; color: #0f0; padding: 15px; border-radius: 8px; border: 1px solid #333; font-family: 'Consolas'; white-space: pre-wrap; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>META CORE <span>HUB</span></h1>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('explorer', this)">Explorer</div>
        <div class="tab" onclick="switchTab('suitgen', this)">Suit Fabricator</div>
        <div class="tab" onclick="switchTab('powergen', this)">Power Registry</div>
    </div>

    <div id="explorer" class="page active"><div id="explorer-content" class="grid"></div></div>

    <div id="suitgen" class="page">
        <div class="grid">
            <div class="card">
                <label>Suit Identifier</label>
                <input type="text" id="suitId" value="template_suit">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <label><input type="checkbox" id="isNano"> Nano-Tech</label>
                    <label><input type="checkbox" id="hasCape"> Cape</label>
                    <label><input type="checkbox" id="allowMask" checked> Mask</label>
                    <label><input type="checkbox" id="allowHood" checked> Hood</label>
                    <label><input type="checkbox" id="allowSuitOff" checked> Suit Off</label>
                </div>
                <button class="btn-gen" onclick="downloadSuit()">GENERATE JSON</button>
            </div>
        </div>
    </div>

    <div id="powergen" class="page">
        <div class="grid">
            <div class="card">
                <label>Registry Key</label><input type="text" id="regSuitId" value="hero_key">
                <label>Suit Item</label><input type="text" id="suitItem" value="suit:hero_suit">
                <div id="effectContainer"></div>
                <button class="btn-gen" style="background:transparent; border:1px dashed var(--cyan); color:var(--cyan);" onclick="addEffectRow()">+ Add Effect</button>
            </div>
            <div class="card">
                <label>Abilities</label>
                <div class="ability-grid" id="abilitiesContainer"></div>
            </div>
        </div>
        <button class="btn-gen" onclick="generateRegistry()">GENERATE REGISTRY</button>
        <div id="output" style="margin-top:20px;">// Registry JSON...</div>
    </div>
</div>

<script>
    // --- NAV ---
    function switchTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- EXPLORER DATA ---
    const DATA = {
        abilities: [{name: "Super Strength", desc: "Increases melee damage.", tags: ["passive", "combat"]}, {name: "Super Speed", desc: "Extreme speed.", tags: ["movement"]}],
        ores: [{name: "Titanium", desc: "Crafting material.", tags: ["rare"]}],
        structures: [{name: "Meteor", desc: "Radioactive.", tags: ["biome:plains"]}]
    };
    function renderExplorer() {
        const c = document.getElementById("explorer-content");
        Object.values(DATA).flat().forEach(i => {
            c.innerHTML += `<div class="card"><div style="font-weight:800; font-size:1.2rem;">${i.name}</div><p>${i.desc}</p>${i.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
        });
    }

    // --- SUIT LOGIC ---
    function downloadSuit() {
        const id = document.getElementById('suitId').value;
        const config = { id, isNano: document.getElementById('isNano').checked, hasCape: document.getElementById('hasCape').checked };
        const content = JSON.stringify({ "format_version": "1.21.0", "minecraft:attachable": { "description": { "identifier": `suit:${config.id}` } } }, null, 2);
        const blob = new Blob([content], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${id}.json`;
        link.click();
    }

    // --- REGISTRY LOGIC ---
    const abilityDb = [{ name: "Flight", id: "ability:flight" }, { name: "Energy Beam", id: "ability:energy_beam" }];
    function initAbilities() {
        const c = document.getElementById('abilitiesContainer');
        abilityDb.forEach((ab, i) => {
            c.innerHTML += `<div class="ability-card" id="card_${i}"><label><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('active', this.checked)"> ${ab.name}</label></div>`;
        });
    }
    function addEffectRow() {
        const div = document.createElement('div');
        div.style.display = "flex"; div.innerHTML = `<input type="text" placeholder="minecraft:effect"> <button onclick="this.parentElement.remove()" style="background:#522; color:#f66; border:none; padding:5px; margin-left:5px;">X</button>`;
        document.getElementById('effectContainer').appendChild(div);
    }
    function generateRegistry() {
        const res = { key: document.getElementById('regSuitId').value, suit: document.getElementById('suitItem').value };
        document.getElementById('output').textContent = JSON.stringify(res, null, 4);
    }

    renderExplorer();
    initAbilities();
</script>
</body>
</html>
